name: Deploy 7th Rank

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────
  # VALIDATE
  # Lint HTML and CSS before deploying
  # ─────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install validators
        run: |
          npm install -g html-validate stylelint stylelint-config-standard

      - name: Validate HTML
        run: |
          cd website
          html-validate index.html || echo "HTML validation warnings (non-blocking)"

      - name: Lint CSS
        run: |
          cd website
          stylelint css/style.css --config='{"extends":"stylelint-config-standard"}' || echo "CSS lint warnings (non-blocking)"

  # ─────────────────────────────────────
  # DEPLOY TO VERCEL
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy website/ \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
